<!DOCTYPE html>
<html lang="en">

<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>VULNRA — Scan History</title>
  <link
    href="https://fonts.googleapis.com/css2?family=Space+Mono:wght@400;700&family=Syne:wght@400;600;700;800&display=swap"
    rel="stylesheet">
  <style>
    *,
    *::before,
    *::after {
      box-sizing: border-box;
      margin: 0;
      padding: 0
    }

    :root {
      --bg: #07090c;
      --bg2: #0c1015;
      --bg3: #111820;
      --border: rgba(255, 255, 255, 0.07);
      --border2: rgba(255, 255, 255, 0.04);
      --green: #00e5a0;
      --green2: rgba(0, 229, 160, 0.08);
      --text: #dde4ec;
      --muted: rgba(221, 228, 236, 0.38);
      --muted2: rgba(221, 228, 236, 0.2);
      --red: #ff4d6a;
      --yellow: #f5c842;
      --mono: 'Space Mono', monospace;
      --sans: 'Syne', sans-serif;
    }

    html {
      scroll-behavior: smooth
    }

    body {
      background: var(--bg);
      color: var(--text);
      font-family: var(--sans);
      min-height: 100vh;
      overflow-x: hidden
    }

    body::before {
      content: '';
      position: fixed;
      inset: 0;
      pointer-events: none;
      z-index: 9999;
      background-image: url("data:image/svg+xml,%3Csvg viewBox='0 0 200 200' xmlns='http://www.w3.org/2000/svg'%3E%3Cfilter id='n'%3E%3CfeTurbulence type='fractalNoise' baseFrequency='0.85' numOctaves='4' stitchTiles='stitch'/%3E%3C/filter%3E%3Crect width='100%25' height='100%25' filter='url(%23n)' opacity='0.03'/%3E%3C/svg%3E");
    }

    ::-webkit-scrollbar {
      width: 3px
    }

    ::-webkit-scrollbar-track {
      background: var(--bg)
    }

    ::-webkit-scrollbar-thumb {
      background: var(--green)
    }

    ::selection {
      background: var(--green);
      color: #000
    }

    @keyframes fadeUp {
      from {
        opacity: 0;
        transform: translateY(16px)
      }

      to {
        opacity: 1;
        transform: translateY(0)
      }
    }

    @keyframes fadeIn {
      from {
        opacity: 0
      }

      to {
        opacity: 1
      }
    }

    @keyframes blink {

      0%,
      100% {
        opacity: 1
      }

      50% {
        opacity: 0
      }
    }

    @keyframes pulse {

      0%,
      100% {
        opacity: 1;
        transform: scale(1)
      }

      50% {
        opacity: .4;
        transform: scale(.65)
      }
    }

    @keyframes spin {
      to {
        transform: rotate(360deg)
      }
    }

    @keyframes rowIn {
      from {
        opacity: 0;
        transform: translateX(-8px)
      }

      to {
        opacity: 1;
        transform: translateX(0)
      }
    }

    @keyframes shine {
      0% {
        left: -100%
      }

      100% {
        left: 200%
      }
    }

    @keyframes scanLine {
      0% {
        left: -15%;
        opacity: 0
      }

      8% {
        opacity: 1
      }

      92% {
        opacity: 1
      }

      100% {
        left: 112%;
        opacity: 0
      }
    }

    /* ── NAV ── */
    nav {
      position: fixed;
      top: 0;
      left: 0;
      right: 0;
      z-index: 100;
      display: flex;
      align-items: center;
      justify-content: space-between;
      padding: 0 48px;
      height: 64px;
      background: rgba(7, 9, 12, 0.9);
      backdrop-filter: blur(16px);
      border-bottom: 1px solid var(--border2);
    }

    .nav-logo {
      display: flex;
      align-items: center;
      gap: 10px;
      font-family: var(--sans);
      font-size: 18px;
      font-weight: 800;
      letter-spacing: -.04em;
      color: var(--text);
      text-decoration: none;
    }

    .nav-logo-icon {
      width: 30px;
      height: 30px;
      border-radius: 8px;
      background: var(--green);
      display: flex;
      align-items: center;
      justify-content: center;
    }

    .nav-logo-icon svg {
      width: 16px;
      height: 16px
    }

    .nav-logo span {
      color: var(--green)
    }

    .nav-right {
      display: flex;
      align-items: center;
      gap: 20px
    }

    .nav-link {
      font-family: var(--mono);
      font-size: 11px;
      letter-spacing: .08em;
      color: var(--muted);
      text-decoration: none;
      transition: color .2s;
    }

    .nav-link:hover {
      color: var(--text)
    }

    .nav-link.active {
      color: var(--green)
    }

    .btn-sm {
      font-family: var(--mono);
      font-size: 10.5px;
      letter-spacing: .1em;
      font-weight: 700;
      background: var(--green);
      color: #000;
      border: none;
      padding: 7px 16px;
      border-radius: 4px;
      cursor: pointer;
      text-decoration: none;
      transition: all .25s;
      display: inline-flex;
      align-items: center;
      gap: 6px;
      position: relative;
      overflow: hidden;
    }

    .btn-sm::after {
      content: '';
      position: absolute;
      top: 0;
      left: -100%;
      width: 50%;
      height: 100%;
      background: linear-gradient(90deg, transparent, rgba(255, 255, 255, .35), transparent);
      transform: skewX(-20deg)
    }

    .btn-sm:hover::after {
      animation: shine .6s ease forwards
    }

    .btn-sm:hover {
      opacity: .9;
      transform: translateY(-1px)
    }

    /* ── PAGE LAYOUT ── */
    .page {
      padding: 100px 48px 80px;
      max-width: 1200px;
      margin: 0 auto
    }

    /* ── HEADER ── */
    .page-header {
      display: flex;
      align-items: flex-end;
      justify-content: space-between;
      margin-bottom: 40px;
      opacity: 0;
      animation: fadeUp .6s ease forwards .1s;
    }

    .page-header-left {}

    .page-eyebrow {
      font-family: var(--mono);
      font-size: 10px;
      letter-spacing: .22em;
      text-transform: uppercase;
      color: var(--green);
      margin-bottom: 10px;
      display: flex;
      align-items: center;
      gap: 8px;
    }

    .page-eyebrow::before {
      content: '';
      width: 6px;
      height: 6px;
      border-radius: 50%;
      background: var(--green);
      animation: pulse 1.8s ease infinite;
    }

    .page-title {
      font-size: clamp(28px, 3.5vw, 42px);
      font-weight: 800;
      letter-spacing: -.04em
    }

    .page-sub {
      font-size: 13.5px;
      color: var(--muted);
      margin-top: 8px;
      font-weight: 400
    }

    /* ── STATS BAR ── */
    .stats-bar {
      display: grid;
      grid-template-columns: repeat(4, 1fr);
      border: 1px solid var(--border);
      border-radius: 8px;
      overflow: hidden;
      margin-bottom: 32px;
      opacity: 0;
      animation: fadeUp .6s ease forwards .2s;
    }

    .stat-cell {
      padding: 20px 24px;
      border-right: 1px solid var(--border);
      position: relative;
      overflow: hidden;
      transition: background .3s;
    }

    .stat-cell:last-child {
      border-right: none
    }

    .stat-cell:hover {
      background: rgba(0, 229, 160, .025)
    }

    .stat-cell::before {
      content: '';
      position: absolute;
      top: 0;
      left: 0;
      right: 0;
      height: 2px;
      background: transparent;
      transition: background .3s
    }

    .stat-cell:hover::before {
      background: var(--green)
    }

    .stat-val {
      font-family: var(--sans);
      font-size: 28px;
      font-weight: 800;
      letter-spacing: -.04em;
      line-height: 1;
      margin-bottom: 4px
    }

    .stat-val .unit {
      font-size: .5em;
      color: var(--green)
    }

    .stat-lbl {
      font-family: var(--mono);
      font-size: 9.5px;
      letter-spacing: .14em;
      color: var(--muted2);
      text-transform: uppercase
    }

    /* ── FILTER BAR ── */
    .filter-bar {
      display: flex;
      align-items: center;
      gap: 10px;
      margin-bottom: 20px;
      opacity: 0;
      animation: fadeUp .6s ease forwards .3s;
    }

    .filter-chip {
      font-family: var(--mono);
      font-size: 9.5px;
      letter-spacing: .1em;
      padding: 5px 14px;
      border-radius: 3px;
      border: 1px solid var(--border);
      color: var(--muted2);
      cursor: pointer;
      transition: all .2s;
      background: none;
    }

    .filter-chip.active {
      border-color: var(--green);
      color: var(--green);
      background: var(--green2)
    }

    .filter-chip:hover:not(.active) {
      border-color: rgba(255, 255, 255, .18);
      color: var(--muted)
    }

    .filter-spacer {
      flex: 1
    }

    .refresh-btn {
      font-family: var(--mono);
      font-size: 9.5px;
      letter-spacing: .1em;
      padding: 5px 14px;
      border-radius: 3px;
      border: 1px solid var(--border);
      color: var(--muted2);
      cursor: pointer;
      transition: all .2s;
      background: none;
      display: flex;
      align-items: center;
      gap: 6px;
    }

    .refresh-btn:hover {
      border-color: rgba(255, 255, 255, .18);
      color: var(--muted)
    }

    .refresh-btn svg {
      transition: transform .4s
    }

    .refresh-btn.spinning svg {
      animation: spin .7s linear infinite
    }

    /* ── TABLE ── */
    .scan-table-wrap {
      border: 1px solid var(--border);
      border-radius: 8px;
      overflow: hidden;
      opacity: 0;
      animation: fadeUp .6s ease forwards .4s;
    }

    .scan-table {
      width: 100%;
      border-collapse: collapse
    }

    .scan-table thead th {
      font-family: var(--mono);
      font-size: 9px;
      letter-spacing: .18em;
      text-transform: uppercase;
      color: var(--muted2);
      padding: 12px 20px;
      text-align: left;
      background: rgba(255, 255, 255, .02);
      border-bottom: 1px solid var(--border);
    }

    .scan-table thead th:last-child {
      text-align: right
    }

    .scan-row {
      border-bottom: 1px solid var(--border2);
      transition: background .2s;
      cursor: default;
      opacity: 0;
      animation: rowIn .35s ease forwards;
    }

    .scan-row:last-child {
      border-bottom: none
    }

    .scan-row:hover {
      background: rgba(255, 255, 255, .022)
    }

    .scan-row td {
      padding: 14px 20px;
      vertical-align: middle
    }

    /* ID cell */
    .scan-id {
      font-family: var(--mono);
      font-size: 10.5px;
      color: var(--muted);
      display: flex;
      align-items: center;
      gap: 8px;
    }

    .scan-id-dot {
      width: 6px;
      height: 6px;
      border-radius: 50%;
      flex-shrink: 0
    }

    .scan-id-dot.high {
      background: var(--red);
      box-shadow: 0 0 6px rgba(255, 77, 106, .5)
    }

    .scan-id-dot.medium {
      background: var(--yellow);
      box-shadow: 0 0 6px rgba(245, 200, 66, .5)
    }

    .scan-id-dot.low {
      background: #27c93f;
      box-shadow: 0 0 6px rgba(39, 201, 63, .5)
    }

    .scan-id-dot.queued {
      background: var(--muted2)
    }

    .scan-id code {
      font-family: var(--mono);
      font-size: 10.5px;
      color: rgba(221, 228, 236, .55);
      letter-spacing: .04em;
    }

    /* URL cell */
    .scan-url {
      font-family: var(--mono);
      font-size: 10.5px;
      color: var(--muted);
      max-width: 220px;
      overflow: hidden;
      text-overflow: ellipsis;
      white-space: nowrap;
    }

    /* Score cell */
    .score-pill {
      display: inline-flex;
      align-items: center;
      gap: 6px;
      font-family: var(--mono);
      font-size: 11px;
      font-weight: 700;
      padding: 3px 10px;
      border-radius: 3px;
    }

    .score-pill.high {
      color: var(--red);
      background: rgba(255, 77, 106, .1);
      border: 1px solid rgba(255, 77, 106, .25)
    }

    .score-pill.medium {
      color: var(--yellow);
      background: rgba(245, 200, 66, .1);
      border: 1px solid rgba(245, 200, 66, .25)
    }

    .score-pill.low {
      color: #27c93f;
      background: rgba(39, 201, 63, .1);
      border: 1px solid rgba(39, 201, 63, .25)
    }

    .score-pill.queued {
      color: var(--muted2);
      background: rgba(255, 255, 255, .04);
      border: 1px solid var(--border)
    }

    /* Tier cell */
    .tier-badge {
      font-family: var(--mono);
      font-size: 9px;
      letter-spacing: .14em;
      padding: 3px 8px;
      border-radius: 2px;
      text-transform: uppercase;
      border: 1px solid var(--border);
      color: var(--muted2);
    }

    .tier-badge.pro {
      border-color: rgba(0, 229, 160, .25);
      color: var(--green);
      background: var(--green2)
    }

    /* Time cell */
    .scan-time {
      font-family: var(--mono);
      font-size: 10px;
      color: var(--muted2)
    }

    /* Status cell */
    .status-badge {
      font-family: var(--mono);
      font-size: 9px;
      letter-spacing: .12em;
      padding: 3px 9px;
      border-radius: 2px;
      text-transform: uppercase;
      display: inline-flex;
      align-items: center;
      gap: 5px;
    }

    .status-badge.complete {
      color: #27c93f;
      background: rgba(39, 201, 63, .08);
      border: 1px solid rgba(39, 201, 63, .2)
    }

    .status-badge.queued {
      color: var(--yellow);
      background: rgba(245, 200, 66, .08);
      border: 1px solid rgba(245, 200, 66, .2)
    }

    .status-badge.failed {
      color: var(--red);
      background: rgba(255, 77, 106, .08);
      border: 1px solid rgba(255, 77, 106, .2)
    }

    .status-badge.scanning {
      color: var(--green);
      background: var(--green2);
      border: 1px solid rgba(0, 229, 160, .2)
    }

    .status-dot {
      width: 5px;
      height: 5px;
      border-radius: 50%;
      background: currentColor
    }

    .status-dot.blink {
      animation: pulse 1.4s ease infinite
    }

    /* Actions cell */
    .actions-cell {
      text-align: right;
      white-space: nowrap
    }

    .action-btn {
      font-family: var(--mono);
      font-size: 9.5px;
      letter-spacing: .1em;
      font-weight: 700;
      padding: 5px 12px;
      border-radius: 3px;
      cursor: pointer;
      border: none;
      transition: all .2s;
      display: inline-flex;
      align-items: center;
      gap: 5px;
      text-decoration: none;
      position: relative;
      overflow: hidden;
    }

    .action-btn::after {
      content: '';
      position: absolute;
      top: 0;
      left: -100%;
      width: 50%;
      height: 100%;
      background: linear-gradient(90deg, transparent, rgba(255, 255, 255, .2), transparent);
      transform: skewX(-20deg)
    }

    .action-btn:hover::after {
      animation: shine .5s ease forwards
    }

    .action-btn.dl {
      background: var(--green);
      color: #000;
    }

    .action-btn.dl:hover {
      opacity: .88;
      transform: translateY(-1px)
    }

    .action-btn.dl.loading {
      opacity: .5;
      cursor: wait;
      pointer-events: none
    }

    .action-btn.view-btn {
      background: none;
      border: 1px solid var(--border);
      color: var(--muted2);
      margin-right: 6px;
    }

    .action-btn.view-btn:hover {
      border-color: rgba(255, 255, 255, .2);
      color: var(--muted)
    }

    .action-btn svg {
      flex-shrink: 0
    }

    /* ── EMPTY STATE ── */
    .empty-state {
      text-align: center;
      padding: 80px 24px;
      font-family: var(--mono);
      color: var(--muted2);
    }

    .empty-state .big {
      font-size: 40px;
      margin-bottom: 16px;
      opacity: .25
    }

    .empty-state p {
      font-size: 11px;
      letter-spacing: .08em;
      line-height: 1.8
    }

    .empty-state a {
      color: var(--green);
      text-decoration: none
    }

    /* ── LOADING STATE ── */
    .loading-state {
      text-align: center;
      padding: 80px 24px
    }

    .loader {
      width: 32px;
      height: 32px;
      border: 2px solid var(--border);
      border-top-color: var(--green);
      border-radius: 50%;
      animation: spin .8s linear infinite;
      margin: 0 auto 16px;
    }

    .loading-state p {
      font-family: var(--mono);
      font-size: 11px;
      color: var(--muted2);
      letter-spacing: .1em
    }

    /* ── SCAN DETAIL DRAWER ── */
    .drawer-overlay {
      position: fixed;
      inset: 0;
      background: rgba(0, 0, 0, .6);
      backdrop-filter: blur(4px);
      z-index: 200;
      opacity: 0;
      pointer-events: none;
      transition: opacity .25s;
    }

    .drawer-overlay.open {
      opacity: 1;
      pointer-events: all
    }

    .drawer {
      position: fixed;
      top: 0;
      right: 0;
      bottom: 0;
      width: 480px;
      max-width: 100vw;
      background: var(--bg2);
      border-left: 1px solid var(--border);
      z-index: 201;
      overflow-y: auto;
      padding: 32px 28px;
      transform: translateX(100%);
      transition: transform .3s cubic-bezier(.4, 0, .2, 1);
    }

    .drawer.open {
      transform: translateX(0)
    }

    .drawer-close {
      position: absolute;
      top: 16px;
      right: 16px;
      background: none;
      border: 1px solid var(--border);
      color: var(--muted2);
      width: 30px;
      height: 30px;
      border-radius: 4px;
      cursor: pointer;
      font-family: var(--mono);
      font-size: 14px;
      display: flex;
      align-items: center;
      justify-content: center;
      transition: all .2s;
    }

    .drawer-close:hover {
      border-color: rgba(255, 255, 255, .2);
      color: var(--text)
    }

    .drawer-eyebrow {
      font-family: var(--mono);
      font-size: 9.5px;
      letter-spacing: .18em;
      color: var(--green);
      margin-bottom: 8px;
      text-transform: uppercase
    }

    .drawer-title {
      font-size: 20px;
      font-weight: 800;
      letter-spacing: -.03em;
      margin-bottom: 4px
    }

    .drawer-url {
      font-family: var(--mono);
      font-size: 10.5px;
      color: var(--muted2);
      margin-bottom: 24px;
      word-break: break-all
    }

    .drawer-divider {
      height: 1px;
      background: var(--border2);
      margin: 20px 0
    }

    .drawer-section-label {
      font-family: var(--mono);
      font-size: 9px;
      letter-spacing: .2em;
      text-transform: uppercase;
      color: var(--muted2);
      margin-bottom: 12px
    }

    .finding-card {
      background: var(--bg3);
      border: 1px solid var(--border);
      border-radius: 6px;
      padding: 14px 16px;
      margin-bottom: 8px;
    }

    .finding-card.high {
      border-left: 3px solid var(--red)
    }

    .finding-card.medium {
      border-left: 3px solid var(--yellow)
    }

    .finding-card.low {
      border-left: 3px solid #27c93f
    }

    .finding-header {
      display: flex;
      align-items: center;
      justify-content: space-between;
      margin-bottom: 6px
    }

    .finding-cat {
      font-family: var(--mono);
      font-size: 10px;
      letter-spacing: .1em;
      color: var(--text)
    }

    .finding-sev {
      font-family: var(--mono);
      font-size: 9px;
      letter-spacing: .1em;
      padding: 2px 7px;
      border-radius: 2px
    }

    .finding-sev.high {
      color: var(--red);
      background: rgba(255, 77, 106, .1)
    }

    .finding-sev.medium {
      color: var(--yellow);
      background: rgba(245, 200, 66, .1)
    }

    .finding-sev.low {
      color: #27c93f;
      background: rgba(39, 201, 63, .1)
    }

    .finding-detail {
      font-size: 12px;
      color: var(--muted);
      line-height: 1.6
    }

    .comp-row {
      display: flex;
      align-items: center;
      gap: 10px;
      padding: 10px 0;
      border-bottom: 1px solid var(--border2)
    }

    .comp-row:last-child {
      border-bottom: none
    }

    .comp-tag {
      font-family: var(--mono);
      font-size: 9px;
      letter-spacing: .12em;
      padding: 2px 8px;
      background: var(--green2);
      border: 1px solid rgba(0, 229, 160, .18);
      color: var(--green);
      border-radius: 2px;
      white-space: nowrap
    }

    .comp-text {
      font-size: 12px;
      color: var(--muted);
      line-height: 1.5
    }

    .drawer-dl-btn {
      width: 100%;
      padding: 11px;
      border-radius: 4px;
      background: var(--green);
      color: #000;
      font-family: var(--mono);
      font-size: 11px;
      font-weight: 700;
      letter-spacing: .12em;
      border: none;
      cursor: pointer;
      margin-top: 20px;
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 8px;
      transition: opacity .2s;
      position: relative;
      overflow: hidden;
    }

    .drawer-dl-btn::after {
      content: '';
      position: absolute;
      top: 0;
      left: -100%;
      width: 50%;
      height: 100%;
      background: linear-gradient(90deg, transparent, rgba(255, 255, 255, .35), transparent);
      transform: skewX(-20deg)
    }

    .drawer-dl-btn:hover::after {
      animation: shine .6s ease forwards
    }

    .drawer-dl-btn:hover {
      opacity: .9
    }

    .drawer-dl-btn.loading {
      opacity: .5;
      cursor: wait;
      pointer-events: none
    }

    @media(max-width:800px) {
      nav {
        padding: 0 20px
      }

      .page {
        padding: 88px 20px 60px
      }

      .stats-bar {
        grid-template-columns: 1fr 1fr
      }

      .drawer {
        width: 100vw
      }

      .scan-url {
        max-width: 120px
      }
    }
  </style>
  <link rel="stylesheet" href="loader.css">
</head>

<body>

  <nav>
    <a href="index.html" class="nav-logo">
      <div class="nav-logo-icon"><svg viewBox="0 0 16 16" fill="none">
          <path d="M3 3h4v4H3zM9 3h4v4H9zM3 9h4v4H3z" fill="#000" />
        </svg></div>
      VULN<span>RA</span>
    </a>
    <div class="nav-right">
      <a href="index.html" class="nav-link">Scanner</a>
      <a href="history.html" class="nav-link active">History</a>
      <a href="index.html#pricing" class="nav-link">Pricing</a>
      <a href="index.html#hero-terminal" class="btn-sm">&#9889; New Scan</a>
    </div>
  </nav>

  <main class="page">

    <div class="page-header">
      <div class="page-header-left">
        <div class="page-eyebrow">SCAN_HISTORY</div>
        <h1 class="page-title">Audit Log</h1>
        <p class="page-sub">All scans persisted in Redis &mdash; last 7 days</p>
      </div>
    </div>

    <!-- Stats bar -->
    <div class="stats-bar" id="stats-bar">
      <div class="stat-cell">
        <div class="stat-val" id="stat-total">&#8212;</div>
        <div class="stat-lbl">Total Scans</div>
      </div>
      <div class="stat-cell">
        <div class="stat-val" id="stat-high"><span class="unit" style="font-size:1em;color:var(--red)">&#8212;</span>
        </div>
        <div class="stat-lbl">High Risk</div>
      </div>
      <div class="stat-cell">
        <div class="stat-val" id="stat-avg">&#8212;</div>
        <div class="stat-lbl">Avg Score</div>
      </div>
      <div class="stat-cell">
        <div class="stat-val" id="stat-complete">&#8212;</div>
        <div class="stat-lbl">Completed</div>
      </div>
    </div>

    <!-- Filter + refresh -->
    <div class="filter-bar">
      <button class="filter-chip active" data-filter="all">All</button>
      <button class="filter-chip" data-filter="complete">Complete</button>
      <button class="filter-chip" data-filter="high">High Risk</button>
      <button class="filter-chip" data-filter="queued">In Progress</button>
      <div class="filter-spacer"></div>
      <button class="refresh-btn" id="refresh-btn">
        <svg width="11" height="11" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5"
          stroke-linecap="round">
          <polyline points="23 4 23 10 17 10" />
          <polyline points="1 20 1 14 7 14" />
          <path d="M3.51 9a9 9 0 0 1 14.85-3.36L23 10M1 14l4.64 4.36A9 9 0 0 0 20.49 15" />
        </svg>
        REFRESH
      </button>
    </div>

    <!-- Table -->
    <div class="scan-table-wrap">
      <div id="table-content">
        <div class="loading-state">
          <div class="loader"></div>
          <p>FETCHING SCAN RECORDS&hellip;</p>
        </div>
      </div>
    </div>

  </main>

  <!-- Drawer overlay -->
  <div class="drawer-overlay" id="drawer-overlay"></div>

  <!-- Detail drawer -->
  <div class="drawer" id="detail-drawer">
    <button class="drawer-close" id="drawer-close">&times;</button>
    <div id="drawer-body"></div>
  </div>

  <script>
    const API_BASE = window.location.origin;
    let allScans = [];
    let currentFilter = 'all';

    // ── Utilities ──────────────────────────────────────────────
    function scoreClass(score) {
      if (score === null || score === undefined) return 'queued';
      return score >= 7 ? 'high' : score >= 4 ? 'medium' : 'low';
    }

    function fmtTime(ts) {
      if (!ts) return '—';
      const d = new Date(ts * 1000);
      const now = new Date();
      const diff = (now - d) / 1000;
      if (diff < 60) return `${Math.round(diff)}s ago`;
      if (diff < 3600) return `${Math.round(diff / 60)}m ago`;
      if (diff < 86400) return `${Math.round(diff / 3600)}h ago`;
      return d.toLocaleDateString('en-GB', { day: 'numeric', month: 'short' });
    }

    function fmtScore(score) {
      return score !== null && score !== undefined ? score.toFixed(1) : '—';
    }

    function shortId(id) {
      return id ? id.substring(0, 8).toUpperCase() : '????????';
    }

    // ── Stats ──────────────────────────────────────────────────
    function updateStats(scans) {
      const complete = scans.filter(s => s.status === 'complete');
      const high = complete.filter(s => (s.risk_score || 0) >= 7);
      const scores = complete.map(s => s.risk_score).filter(Boolean);
      const avg = scores.length ? (scores.reduce((a, b) => a + b, 0) / scores.length).toFixed(1) : '—';
      document.getElementById('stat-total').textContent = scans.length;
      document.getElementById('stat-high').innerHTML = `<span style="color:var(--red)">${high.length}</span>`;
      document.getElementById('stat-avg').textContent = avg;
      document.getElementById('stat-complete').textContent = complete.length;
    }

    // ── Filter ──────────────────────────────────────────────────
    function applyFilter(scans, filter) {
      switch (filter) {
        case 'complete': return scans.filter(s => s.status === 'complete');
        case 'high': return scans.filter(s => (s.risk_score || 0) >= 7);
        case 'queued': return scans.filter(s => s.status !== 'complete' && s.status !== 'failed');
        default: return scans;
      }
    }

    // ── Render table ───────────────────────────────────────────
    function renderTable(scans) {
      const wrap = document.getElementById('table-content');
      if (scans.length === 0) {
        wrap.innerHTML = `<div class="empty-state">
          <div class="big">&#128202;</div>
          <p>NO SCANS FOUND<br><br><a href="index.html#hero-terminal">Run your first scan &#8594;</a></p>
        </div>`;
        return;
      }

      const rows = scans.map((s, i) => {
        const sc = scoreClass(s.risk_score);
        const ts = s.completed_at || null;
        const tier = (s.tier || 'free').toLowerCase();
        const status = s.status || 'queued';
        const statusClass = status === 'complete' ? 'complete' : status === 'failed' ? 'failed' : status === 'scanning' ? 'scanning' : 'queued';
        const canDl = status === 'complete';

        return `<tr class="scan-row" style="animation-delay:${i * 0.04}s" data-id="${s.scan_id}">
          <td>
            <div class="scan-id">
              <div class="scan-id-dot ${sc}"></div>
              <code>${shortId(s.scan_id)}</code>
            </div>
          </td>
          <td><div class="scan-url" title="${s.url || ''}">${s.url || '—'}</div></td>
          <td>
            <span class="score-pill ${sc}">
              ${fmtScore(s.risk_score)}
            </span>
          </td>
          <td><span class="tier-badge ${tier === 'pro' || tier === 'enterprise' ? 'pro' : ''}">${tier}</span></td>
          <td>
            <span class="status-badge ${statusClass}">
              <span class="status-dot ${statusClass !== 'complete' && statusClass !== 'failed' ? 'blink' : ''}"></span>
              ${status}
            </span>
          </td>
          <td><span class="scan-time">${fmtTime(ts)}</span></td>
          <td class="actions-cell">
            <button class="action-btn view-btn" onclick="openDrawer('${s.scan_id}')" title="View details">
              <svg width="11" height="11" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round"><path d="M1 12s4-8 11-8 11 8 11 8-4 8-11 8-11-8-11-8z"/><circle cx="12" cy="12" r="3"/></svg>
            </button>
            <button class="action-btn dl ${canDl ? '' : ' disabled'}"
              onclick="${canDl ? `downloadReport('${s.scan_id}',this)` : ''}"
              title="${canDl ? 'Download PDF' : 'Scan not complete'}"
              style="${canDl ? '' : 'opacity:.3;cursor:not-allowed'}">
              <svg width="11" height="11" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round">
                <path d="M21 15v4a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2v-4"/>
                <polyline points="7 10 12 15 17 10"/><line x1="12" y1="15" x2="12" y2="3"/>
              </svg>
              PDF
            </button>
          </td>
        </tr>`;
      }).join('');

      wrap.innerHTML = `<table class="scan-table">
        <thead><tr>
          <th>SCAN ID</th>
          <th>ENDPOINT</th>
          <th>RISK SCORE</th>
          <th>TIER</th>
          <th>STATUS</th>
          <th>TIME</th>
          <th style="text-align:right">ACTIONS</th>
        </tr></thead>
        <tbody>${rows}</tbody>
      </table>`;
    }

    // ── Fetch + display ────────────────────────────────────────
    async function loadScans() {
      const refreshBtn = document.getElementById('refresh-btn');
      refreshBtn.classList.add('spinning');
      try {
        const res = await fetch(`${API_BASE}/scans`);
        const data = await res.json();
        allScans = data.scans || [];
        updateStats(allScans);
        renderTable(applyFilter(allScans, currentFilter));
      } catch (e) {
        document.getElementById('table-content').innerHTML = `<div class="empty-state">
          <div class="big">&#9888;</div>
          <p>CANNOT REACH API<br><br><span style="color:var(--muted2)">Make sure uvicorn is running on port 8000</span><br><br><a href="#" onclick="loadScans();return false">Retry &#8594;</a></p>
        </div>`;
      } finally {
        refreshBtn.classList.remove('spinning');
      }
    }

    // ── Filter chips ───────────────────────────────────────────
    document.querySelectorAll('.filter-chip').forEach(chip => {
      chip.addEventListener('click', () => {
        document.querySelectorAll('.filter-chip').forEach(c => c.classList.remove('active'));
        chip.classList.add('active');
        currentFilter = chip.dataset.filter;
        renderTable(applyFilter(allScans, currentFilter));
      });
    });

    document.getElementById('refresh-btn').addEventListener('click', loadScans);

    // ── Download PDF ───────────────────────────────────────────
    async function downloadReport(scanId, btn) {
      if (!scanId) return;
      const origHtml = btn.innerHTML;
      btn.classList.add('loading');
      btn.innerHTML = '&#8943;';
      try {
        const res = await fetch(`${API_BASE}/scan/${scanId}/report`);
        if (!res.ok) throw new Error(`${res.status}`);
        const blob = await res.blob();
        const url = URL.createObjectURL(blob);
        const a = document.createElement('a');
        a.href = url; a.download = `vulnra_audit_${scanId.substring(0, 8)}.pdf`;
        a.click(); URL.revokeObjectURL(url);
        btn.innerHTML = '&#10003;';
        setTimeout(() => { btn.innerHTML = origHtml; btn.classList.remove('loading'); }, 2000);
      } catch (e) {
        btn.innerHTML = 'ERR';
        setTimeout(() => { btn.innerHTML = origHtml; btn.classList.remove('loading'); }, 2000);
      }
    }

    // ── Detail Drawer ──────────────────────────────────────────
    function openDrawer(scanId) {
      const scan = allScans.find(s => s.scan_id === scanId);
      if (!scan) return;

      const sc = scoreClass(scan.risk_score);
      const status = scan.status || 'queued';
      const findings = scan.findings || [];
      const comp = scan.compliance || {};

      let findingsHtml = '';
      if (findings.length === 0) {
        findingsHtml = '<p style="font-family:var(--mono);font-size:11px;color:var(--muted2)">No findings recorded.</p>';
      } else {
        findingsHtml = findings.map(f => {
          if (f.blurred) return `<div class="finding-card medium"><div class="finding-detail" style="color:var(--yellow)">&#128274; Upgrade to Pro to unlock full findings</div></div>`;
          const fc = (f.severity || 'LOW').toLowerCase();
          return `<div class="finding-card ${fc}">
            <div class="finding-header">
              <span class="finding-cat">${f.category || 'UNKNOWN'}</span>
              <span class="finding-sev ${fc}">${f.severity || 'LOW'}</span>
            </div>
            <div class="finding-detail">${f.detail || ''}</div>
          </div>`;
        }).join('');
      }

      let compHtml = '';
      if (comp.blurred) {
        compHtml = '<p style="font-family:var(--mono);font-size:11px;color:var(--yellow)">&#128274; Compliance mapping locked — upgrade to Pro</p>';
      } else {
        const rows = [];
        if (comp.eu_ai_act) rows.push(['EU AI ACT', comp.eu_ai_act.articles?.join(', ') || 'Art. 9, 13, 17', `Fine: &#8364;${((comp.eu_ai_act.fine_eur || 0) / 1e6).toFixed(0)}M`]);
        if (comp.dpdp) rows.push(['DPDP', comp.dpdp.sections?.join(', ') || 'Sec. 8, 11', `Fine: &#8377;${((comp.dpdp.fine_inr || 0) / 1e7).toFixed(0)}Cr`]);
        if (comp.nist_ai_rmf) rows.push(['NIST RMF', comp.nist_ai_rmf.functions?.join(', ') || 'GOVERN, MAP', '']);
        if (rows.length === 0) {
          compHtml = '<p style="font-family:var(--mono);font-size:11px;color:var(--muted2)">No compliance data.</p>';
        } else {
          compHtml = rows.map(([tag, text, fine]) => `<div class="comp-row">
            <span class="comp-tag">${tag}</span>
            <span class="comp-text">${text}${fine ? ` <span style="color:var(--red);font-family:var(--mono);font-size:10px">${fine}</span>` : ''}</span>
          </div>`).join('');
        }
      }

      const canDl = status === 'complete';

      document.getElementById('drawer-body').innerHTML = `
        <div class="drawer-eyebrow">SCAN DETAIL</div>
        <div class="drawer-title">${shortId(scan.scan_id)}</div>
        <div class="drawer-url">${scan.url || '—'}</div>

        <div style="display:flex;gap:10px;flex-wrap:wrap;margin-bottom:8px">
          <span class="score-pill ${sc}" style="font-size:13px;padding:4px 14px">Score: ${fmtScore(scan.risk_score)}</span>
          <span class="status-badge ${status === 'complete' ? 'complete' : status === 'failed' ? 'failed' : 'queued'}">${status}</span>
          <span class="tier-badge ${(scan.tier || 'free') === 'pro' ? 'pro' : ''}">${scan.tier || 'free'}</span>
        </div>

        <div class="drawer-divider"></div>
        <div class="drawer-section-label">Findings</div>
        ${findingsHtml}

        <div class="drawer-divider"></div>
        <div class="drawer-section-label">Compliance</div>
        ${compHtml}

        <div class="drawer-divider"></div>
        <div style="display:flex;gap:8px;font-family:var(--mono);font-size:10px;color:var(--muted2)">
          <span>Engine: ${scan.scan_engine || '—'}</span>
          <span style="margin-left:auto">${fmtTime(scan.completed_at)}</span>
        </div>

        ${canDl ? `<button class="drawer-dl-btn" id="drawer-dl-btn" onclick="drawerDownload('${scan.scan_id}')">
          <svg width="13" height="13" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.2" stroke-linecap="round" stroke-linejoin="round">
            <path d="M21 15v4a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2v-4"/>
            <polyline points="7 10 12 15 17 10"/><line x1="12" y1="15" x2="12" y2="3"/>
          </svg>
          DOWNLOAD AUDIT REPORT
        </button>` : ''}
      `;

      document.getElementById('drawer-overlay').classList.add('open');
      document.getElementById('detail-drawer').classList.add('open');
    }

    async function drawerDownload(scanId) {
      const btn = document.getElementById('drawer-dl-btn');
      if (!btn) return;
      btn.classList.add('loading');
      btn.textContent = 'GENERATING PDF\u2026';
      try {
        const res = await fetch(`${API_BASE}/scan/${scanId}/report`);
        if (!res.ok) throw new Error(`${res.status}`);
        const blob = await res.blob();
        const url = URL.createObjectURL(blob);
        const a = document.createElement('a');
        a.href = url; a.download = `vulnra_audit_${scanId.substring(0, 8)}.pdf`;
        a.click(); URL.revokeObjectURL(url);
        btn.textContent = '\u2713 DOWNLOADED';
        setTimeout(() => { btn.textContent = 'DOWNLOAD AUDIT REPORT'; btn.classList.remove('loading'); }, 2500);
      } catch (e) {
        btn.textContent = 'FAILED — RETRY';
        btn.classList.remove('loading');
      }
    }

    function closeDrawer() {
      document.getElementById('drawer-overlay').classList.remove('open');
      document.getElementById('detail-drawer').classList.remove('open');
    }

    document.getElementById('drawer-close').addEventListener('click', closeDrawer);
    document.getElementById('drawer-overlay').addEventListener('click', closeDrawer);

    // ── Init ───────────────────────────────────────────────────
    loadScans();

    // Auto-refresh every 10s if any scans are in-progress
    setInterval(() => {
      if (allScans.some(s => s.status !== 'complete' && s.status !== 'failed')) {
        loadScans();
      }
    }, 10000);
  </script>

  <script src="loader.js"></script>
</body>

</html>
