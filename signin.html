<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>VULNRA — Sign In</title>
  <link href="https://fonts.googleapis.com/css2?family=IBM+Plex+Mono:ital,wght@0,300;0,400;0,500;0,600;0,700;1,400&family=DM+Sans:opsz,wght@9..40,300;9..40,400;9..40,500@display=swap" rel="stylesheet">
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    :root {
      --bg:    #060608;
      --bg1:   #0a0b0f;
      --bg2:   #0f1117;
      --acid:  #b8ff57;
      --acid2: rgba(184,255,87,0.07);
      --acid3: rgba(184,255,87,0.18);
      --red:   #ff3c5a;
      --amber: #ffb340;
      --text:  #e8edf4;
      --muted: rgba(232,237,244,0.42);
      --muted2:rgba(232,237,244,0.2);
      --muted3:rgba(232,237,244,0.1);
      --border:rgba(255,255,255,0.07);
      --border2:rgba(255,255,255,0.04);
      --mono:  'IBM Plex Mono', monospace;
      --sans:  'DM Sans', sans-serif;
    }

    html { height: 100%; }

    body {
      background: var(--bg);
      color: var(--text);
      font-family: var(--sans);
      min-height: 100vh;
      display: flex;
      flex-direction: column;
      overflow-x: hidden;
    }

    /* grain */
    body::before {
      content: '';
      position: fixed; inset: -200%;
      width: 400%; height: 400%;
      background-image: url("data:image/svg+xml,%3Csvg viewBox='0 0 256 256' xmlns='http://www.w3.org/2000/svg'%3E%3Cfilter id='n'%3E%3CfeTurbulence type='fractalNoise' baseFrequency='0.9' numOctaves='4' stitchTiles='stitch'/%3E%3C/filter%3E%3Crect width='100%25' height='100%25' filter='url(%23n)' opacity='0.04'/%3E%3C/svg%3E");
      pointer-events: none; z-index: 9999;
      animation: grain .4s steps(1) infinite;
    }
    /* scanlines */
    body::after {
      content: '';
      position: fixed; inset: 0;
      background: repeating-linear-gradient(0deg, transparent, transparent 2px, rgba(0,0,0,0.025) 2px, rgba(0,0,0,0.025) 4px);
      pointer-events: none; z-index: 9998;
    }

    @keyframes grain {
      0%   { transform: translate(0,0); }
      20%  { transform: translate(-3%,-4%); }
      40%  { transform: translate(-6%,3%); }
      60%  { transform: translate(3%,-2%); }
      80%  { transform: translate(-4%,6%); }
      100% { transform: translate(5%,-3%); }
    }
    @keyframes fadeUp {
      from { opacity:0; transform:translateY(16px); }
      to   { opacity:1; transform:translateY(0); }
    }
    @keyframes blink {
      0%,100% { opacity:1; } 50% { opacity:0; }
    }
    @keyframes pulse {
      0%,100% { opacity:1; transform:scale(1); }
      50%      { opacity:.3; transform:scale(.6); }
    }
    @keyframes shine {
      0%   { left:-100%; }
      100% { left:200%; }
    }
    @keyframes orb1 {
      0%,100% { transform:translate(0,0) scale(1); }
      50%      { transform:translate(60px,-50px) scale(1.1); }
    }
    @keyframes orb2 {
      0%,100% { transform:translate(0,0) scale(1); }
      50%      { transform:translate(-50px,60px) scale(.9); }
    }
    @keyframes scanH {
      0%   { top:-2px; opacity:0; }
      5%   { opacity:1; }
      95%  { opacity:1; }
      100% { top:100%; opacity:0; }
    }

    ::-webkit-scrollbar { width:3px; }
    ::-webkit-scrollbar-thumb { background:var(--acid); }
    ::selection { background:var(--acid); color:#000; }

    /* ── NAV ── */
    nav {
      position: fixed; top:0; left:0; right:0; z-index:100;
      display:flex; align-items:center; justify-content:space-between;
      padding:0 48px; height:60px;
      background:rgba(6,6,8,.9);
      backdrop-filter:blur(20px);
      border-bottom:1px solid var(--border2);
    }
    nav::after {
      content:''; position:absolute; bottom:0; left:0; right:0; height:1px;
      background:linear-gradient(90deg,transparent,rgba(184,255,87,.25),transparent);
    }
    .nav-logo {
      display:flex; align-items:center; gap:10px;
      font-family:var(--mono); font-size:15px; font-weight:700;
      letter-spacing:.1em; color:var(--text); text-decoration:none;
    }
    .nav-logo-mark {
      width:28px; height:28px; border-radius:5px; background:var(--acid);
      display:flex; align-items:center; justify-content:center;
    }
    .nav-logo-mark svg { width:14px; height:14px; }
    .nav-logo em { font-style:normal; color:var(--acid); }
    .nav-right { display:flex; align-items:center; gap:14px; }
    .nav-link {
      font-family:var(--mono); font-size:10.5px; letter-spacing:.1em;
      color:var(--muted); text-decoration:none; transition:color .2s;
    }
    .nav-link:hover { color:var(--text); }
    .btn-acid {
      font-family:var(--mono); font-size:10.5px; font-weight:600;
      letter-spacing:.12em; background:var(--acid); color:#000;
      border:none; padding:8px 18px; border-radius:3px; cursor:pointer;
      text-decoration:none; transition:all .25s;
      display:inline-flex; align-items:center; gap:6px;
      position:relative; overflow:hidden;
    }
    .btn-acid::after {
      content:''; position:absolute; top:0; left:-100%; width:50%; height:100%;
      background:linear-gradient(90deg,transparent,rgba(255,255,255,.5),transparent);
      transform:skewX(-20deg);
    }
    .btn-acid:hover::after { animation:shine .6s ease forwards; }
    .btn-acid:hover { transform:translateY(-2px); box-shadow:0 8px 20px rgba(184,255,87,.3); }

    /* ── LAYOUT ── */
    .page {
      flex:1; display:flex; align-items:center; justify-content:center;
      padding:100px 24px 60px; position:relative; overflow:hidden;
    }
    .orb {
      position:absolute; border-radius:50%; filter:blur(80px); pointer-events:none;
    }
    .orb-1 {
      width:500px; height:500px; background:rgba(184,255,87,.09);
      top:-15%; left:-15%; animation:orb1 12s ease-in-out infinite;
    }
    .orb-2 {
      width:400px; height:400px; background:rgba(255,60,90,.07);
      bottom:-10%; right:-10%; animation:orb2 14s ease-in-out infinite;
    }

    /* ── CARD ── */
    .card {
      width:100%; max-width:460px;
      background:var(--bg1);
      border:1px solid var(--border);
      border-radius:6px;
      position:relative; overflow:hidden;
      z-index:1;
      opacity:0; animation:fadeUp .6s ease forwards .1s;
    }
    .card::before {
      content:''; position:absolute; top:0; left:0; right:0; height:1px;
      background:linear-gradient(90deg,transparent,var(--acid),transparent);
      opacity:.4;
    }
    /* scan line */
    .card-scan {
      position:absolute; left:0; right:0; height:1px;
      background:linear-gradient(90deg,transparent,rgba(184,255,87,.35),transparent);
      animation:scanH 6s ease-in-out infinite 2s;
      pointer-events:none; z-index:2;
    }

    .card-head {
      padding:28px 32px 24px;
      border-bottom:1px solid var(--border2);
      display:flex; flex-direction:column; gap:6px;
    }
    .card-eyebrow {
      font-family:var(--mono); font-size:9px; letter-spacing:.26em;
      color:var(--acid); display:flex; align-items:center; gap:8px;
    }
    .card-eyebrow .dot {
      width:5px; height:5px; border-radius:50%;
      background:var(--acid); animation:pulse 1.8s ease infinite;
    }
    .card-title {
      font-family:var(--mono); font-size:22px; font-weight:700;
      letter-spacing:-.02em; color:var(--text);
    }
    .card-sub {
      font-size:13px; color:var(--muted); font-weight:300; line-height:1.5;
    }

    .card-body { padding:28px 32px 32px; display:flex; flex-direction:column; gap:18px; }

    /* ── FORM FIELDS ── */
    .field { display:flex; flex-direction:column; gap:7px; }
    .field label {
      font-family:var(--mono); font-size:9px; letter-spacing:.2em;
      text-transform:uppercase; color:var(--muted2);
    }
    .field-wrap {
      position:relative; display:flex; align-items:center;
    }
    .field-wrap .field-icon {
      position:absolute; left:13px; color:var(--muted2);
      display:flex; align-items:center; pointer-events:none;
      transition:color .2s;
    }
    .field-wrap input {
      width:100%; background:rgba(255,255,255,.03);
      border:1px solid var(--border);
      border-radius:3px; padding:11px 14px 11px 40px;
      font-family:var(--mono); font-size:12px; color:var(--text);
      outline:none; transition:border-color .2s, background .2s;
      letter-spacing:.04em;
    }
    .field-wrap input::placeholder { color:var(--muted3); }
    .field-wrap input:focus {
      border-color:rgba(184,255,87,.4);
      background:rgba(184,255,87,.03);
    }
    .field-wrap input:focus + .field-line { transform:scaleX(1); }
    .field-wrap input:focus ~ .field-icon { color:var(--acid); }
    .field-line {
      position:absolute; bottom:0; left:0; right:0; height:1px;
      background:var(--acid); transform:scaleX(0); transform-origin:left;
      transition:transform .3s ease; border-radius:0 0 3px 3px;
    }
    .toggle-pw {
      position:absolute; right:13px; color:var(--muted2); cursor:pointer;
      display:flex; align-items:center; transition:color .2s; background:none; border:none;
    }
    .toggle-pw:hover { color:var(--text); }

    .field-row { display:flex; align-items:center; justify-content:space-between; }
    .field-row label { font-family:var(--mono); font-size:9px; letter-spacing:.14em; color:var(--muted2); }
    .remember { display:flex; align-items:center; gap:8px; cursor:pointer; }
    .remember input[type=checkbox] { display:none; }
    .check-box {
      width:14px; height:14px; border:1px solid var(--border);
      border-radius:2px; display:flex; align-items:center; justify-content:center;
      transition:all .2s; flex-shrink:0;
    }
    .remember input:checked ~ .check-box {
      background:var(--acid); border-color:var(--acid);
    }
    .remember input:checked ~ .check-box::after {
      content:'✓'; font-size:9px; color:#000; font-family:var(--mono); font-weight:700;
    }
    .forgot {
      font-family:var(--mono); font-size:9.5px; letter-spacing:.08em;
      color:var(--muted2); text-decoration:none; transition:color .2s;
    }
    .forgot:hover { color:var(--acid); }

    /* ── DIVIDER ── */
    .divider {
      display:flex; align-items:center; gap:12px;
    }
    .divider span {
      font-family:var(--mono); font-size:9px; letter-spacing:.16em;
      color:var(--muted2); white-space:nowrap;
    }
    .divider::before, .divider::after {
      content:''; flex:1; height:1px; background:var(--border);
    }

    /* ── OAUTH BUTTONS ── */
    .oauth-grid { display:grid; grid-template-columns:1fr 1fr; gap:8px; }
    .oauth-btn {
      display:flex; align-items:center; justify-content:center; gap:8px;
      background:rgba(255,255,255,.03); border:1px solid var(--border);
      border-radius:3px; padding:10px; cursor:pointer;
      font-family:var(--mono); font-size:10px; letter-spacing:.06em; color:var(--muted);
      text-decoration:none; transition:all .2s;
      position:relative; overflow:hidden;
    }
    .oauth-btn::after {
      content:''; position:absolute; top:0; left:-100%; width:50%; height:100%;
      background:linear-gradient(90deg,transparent,rgba(255,255,255,.08),transparent);
      transform:skewX(-20deg);
    }
    .oauth-btn:hover::after { animation:shine .5s ease forwards; }
    .oauth-btn:hover { border-color:rgba(255,255,255,.14); color:var(--text); transform:translateY(-1px); }
    .oauth-btn svg { flex-shrink:0; }

    /* ── SUBMIT ── */
    .submit-btn {
      width:100%; background:var(--acid); color:#000;
      border:none; border-radius:3px; padding:13px;
      font-family:var(--mono); font-size:11px; font-weight:700;
      letter-spacing:.14em; cursor:pointer; transition:all .25s;
      position:relative; overflow:hidden;
      display:flex; align-items:center; justify-content:center; gap:8px;
    }
    .submit-btn::after {
      content:''; position:absolute; top:0; left:-100%; width:50%; height:100%;
      background:linear-gradient(90deg,transparent,rgba(255,255,255,.5),transparent);
      transform:skewX(-20deg);
    }
    .submit-btn:hover::after { animation:shine .6s ease forwards; }
    .submit-btn:hover { transform:translateY(-2px); box-shadow:0 10px 24px rgba(184,255,87,.3); }
    .submit-btn:active { transform:translateY(0); }

    /* ── ERROR ── */
    .error-msg {
      display:none; padding:10px 14px;
      background:rgba(255,60,90,.08); border:1px solid rgba(255,60,90,.2);
      border-radius:3px; font-family:var(--mono); font-size:10.5px;
      color:var(--red); letter-spacing:.04em;
      align-items:center; gap:8px;
    }
    .error-msg.show { display:flex; animation:fadeUp .3s ease forwards; }

    /* ── FOOTER LINK ── */
    .card-foot {
      padding:18px 32px 24px;
      border-top:1px solid var(--border2);
      text-align:center;
      font-family:var(--mono); font-size:10.5px; color:var(--muted2); letter-spacing:.06em;
    }
    .card-foot a { color:var(--acid); text-decoration:none; transition:opacity .2s; }
    .card-foot a:hover { opacity:.75; }

    /* ── CORNER DECORATION ── */
    .corner {
      position:absolute; width:12px; height:12px; pointer-events:none; z-index:3;
    }
    .corner.tl { top:8px; left:8px; border-top:1px solid var(--acid); border-left:1px solid var(--acid); opacity:.4; }
    .corner.tr { top:8px; right:8px; border-top:1px solid var(--acid); border-right:1px solid var(--acid); opacity:.4; }
    .corner.bl { bottom:8px; left:8px; border-bottom:1px solid var(--acid); border-left:1px solid var(--acid); opacity:.4; }
    .corner.br { bottom:8px; right:8px; border-bottom:1px solid var(--acid); border-right:1px solid var(--acid); opacity:.4; }

    /* ── STATUS BAR ── */
    .status-bar {
      position:fixed; bottom:0; left:0; right:0;
      background:var(--bg1); border-top:1px solid var(--border2);
      padding:7px 48px; display:flex; align-items:center; gap:24px;
      font-family:var(--mono); font-size:9px; letter-spacing:.14em; color:var(--muted2);
      z-index:100;
    }
    .status-item { display:flex; align-items:center; gap:6px; }
    .status-dot { width:5px; height:5px; border-radius:50%; background:var(--acid); animation:pulse 2s ease infinite; }
    .status-dot.r { background:var(--red); }

    footer { padding-bottom:32px; }
  </style>
</head>
<body>

  <nav>
    <a href="index.html" class="nav-logo">
      <div class="nav-logo-mark">
        <svg viewBox="0 0 14 14" fill="none">
          <rect x="1" y="1" width="5" height="5" fill="#000"/>
          <rect x="8" y="1" width="5" height="5" fill="#000"/>
          <rect x="1" y="8" width="5" height="5" fill="#000"/>
          <rect x="8" y="10" width="2" height="2" fill="#000"/>
          <rect x="11" y="10" width="2" height="2" fill="#000"/>
        </svg>
      </div>
      VULN<em>RA</em>
    </a>
    <div class="nav-right">
      <span style="font-family:var(--mono);font-size:10px;letter-spacing:.12em;color:var(--muted2)">No account?</span>
      <a href="signup.html" class="btn-acid">Create account →</a>
    </div>
  </nav>

  <div class="page">
    <div class="orb orb-1"></div>
    <div class="orb orb-2"></div>

    <div class="card">
      <div class="card-scan"></div>
      <div class="corner tl"></div>
      <div class="corner tr"></div>
      <div class="corner bl"></div>
      <div class="corner br"></div>

      <div class="card-head">
        <div class="card-eyebrow"><span class="dot"></span>AUTHENTICATE</div>
        <div class="card-title">Sign in</div>
        <div class="card-sub">Access your scan history, reports, and compliance data.</div>
      </div>

      <div class="card-body">

        <!-- OAuth -->
        <div class="oauth-grid">
          <a href="#" class="oauth-btn">
            <svg width="15" height="15" viewBox="0 0 24 24" fill="currentColor">
              <path d="M22.56 12.25c0-.78-.07-1.53-.2-2.25H12v4.26h5.92c-.26 1.37-1.04 2.53-2.21 3.31v2.77h3.57c2.08-1.92 3.28-4.74 3.28-8.09z" fill="#4285F4"/>
              <path d="M12 23c2.97 0 5.46-.98 7.28-2.66l-3.57-2.77c-.98.66-2.23 1.06-3.71 1.06-2.86 0-5.29-1.93-6.16-4.53H2.18v2.84C3.99 20.53 7.7 23 12 23z" fill="#34A853"/>
              <path d="M5.84 14.09c-.22-.66-.35-1.36-.35-2.09s.13-1.43.35-2.09V7.07H2.18C1.43 8.55 1 10.22 1 12s.43 3.45 1.18 4.93l3.66-2.84z" fill="#FBBC05"/>
              <path d="M12 5.38c1.62 0 3.06.56 4.21 1.64l3.15-3.15C17.45 2.09 14.97 1 12 1 7.7 1 3.99 3.47 2.18 7.07l3.66 2.84c.87-2.6 3.3-4.53 6.16-4.53z" fill="#EA4335"/>
            </svg>
            Google
          </a>
          <a href="#" class="oauth-btn">
            <svg width="15" height="15" viewBox="0 0 24 24" fill="currentColor">
              <path d="M12 2C6.477 2 2 6.484 2 12.017c0 4.425 2.865 8.18 6.839 9.504.5.092.682-.217.682-.483 0-.237-.008-.868-.013-1.703-2.782.605-3.369-1.343-3.369-1.343-.454-1.158-1.11-1.466-1.11-1.466-.908-.62.069-.608.069-.608 1.003.07 1.531 1.032 1.531 1.032.892 1.53 2.341 1.088 2.91.832.092-.647.35-1.088.636-1.338-2.22-.253-4.555-1.113-4.555-4.951 0-1.093.39-1.988 1.029-2.688-.103-.253-.446-1.272.098-2.65 0 0 .84-.27 2.75 1.026A9.564 9.564 0 0112 6.844a9.59 9.59 0 012.504.337c1.909-1.296 2.747-1.027 2.747-1.027.546 1.379.202 2.398.1 2.651.64.7 1.028 1.595 1.028 2.688 0 3.848-2.339 4.695-4.566 4.943.359.309.678.92.678 1.855 0 1.338-.012 2.419-.012 2.747 0 .268.18.58.688.482A10.02 10.02 0 0022 12.017C22 6.484 17.522 2 12 2z"/>
            </svg>
            GitHub
          </a>
        </div>

        <div class="divider"><span>OR CONTINUE WITH EMAIL</span></div>

        <!-- Error -->
        <div class="error-msg" id="error-msg">
          <svg width="13" height="13" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><circle cx="12" cy="12" r="10"/><line x1="12" y1="8" x2="12" y2="12"/><line x1="12" y1="16" x2="12.01" y2="16"/></svg>
          <span id="error-text">Invalid credentials. Please try again.</span>
        </div>

        <!-- Email -->
        <div class="field">
          <label>Email address</label>
          <div class="field-wrap">
            <span class="field-icon">
              <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8"><rect x="2" y="4" width="20" height="16" rx="2"/><path d="M2 7l10 7 10-7"/></svg>
            </span>
            <input type="email" id="email" placeholder="operator@vulnra.ai" autocomplete="email">
            <div class="field-line"></div>
          </div>
        </div>

        <!-- Password -->
        <div class="field">
          <label>Password</label>
          <div class="field-wrap">
            <span class="field-icon">
              <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8"><rect x="3" y="11" width="18" height="11" rx="2"/><path d="M7 11V7a5 5 0 0110 0v4"/></svg>
            </span>
            <input type="password" id="password" placeholder="••••••••••••" autocomplete="current-password">
            <button class="toggle-pw" type="button" onclick="togglePw('password', this)" tabindex="-1">
              <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8"><path d="M1 12s4-8 11-8 11 8 11 8-4 8-11 8-11-8-11-8z"/><circle cx="12" cy="12" r="3"/></svg>
            </button>
            <div class="field-line"></div>
          </div>
        </div>

        <!-- Row -->
        <div class="field-row">
          <label class="remember">
            <input type="checkbox" id="remember">
            <div class="check-box"></div>
            Remember this device
          </label>
          <a href="#" class="forgot">Forgot password?</a>
        </div>

        <!-- Submit -->
        <button class="submit-btn" id="submit-btn" onclick="handleSignIn()">
          <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.2" stroke-linecap="round"><path d="M15 3h6v18h-6M10 17l5-5-5-5M3 12h12"/></svg>
          AUTHENTICATE
        </button>

      </div>

      <div class="card-foot">
        No account? <a href="signup.html">Create one →</a>
      </div>
    </div>
  </div>

  <div class="status-bar">
    <div class="status-item"><span class="status-dot"></span>TLS 1.3 ENCRYPTED</div>
    <div class="status-item"><span class="status-dot r"></span>SESSION: UNAUTHENTICATED</div>
    <div class="status-item" style="margin-left:auto">VULNRA_AUTH_NODE_v2.1</div>
  </div>

  <script>
    function togglePw(id, btn) {
      const input = document.getElementById(id);
      const isText = input.type === 'text';
      input.type = isText ? 'password' : 'text';
      btn.innerHTML = isText
        ? '<svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8"><path d="M1 12s4-8 11-8 11 8 11 8-4 8-11 8-11-8-11-8z"/><circle cx="12" cy="12" r="3"/></svg>'
        : '<svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8"><path d="M17.94 17.94A10.07 10.07 0 0112 20c-7 0-11-8-11-8a18.45 18.45 0 015.06-5.94M9.9 4.24A9.12 9.12 0 0112 4c7 0 11 8 11 8a18.5 18.5 0 01-2.16 3.19m-6.72-1.07a3 3 0 11-4.24-4.24M1 1l22 22"/></svg>';
    }

    function showError(msg) {
      const el = document.getElementById('error-msg');
      document.getElementById('error-text').textContent = msg;
      el.classList.add('show');
    }

    function handleSignIn() {
      const email = document.getElementById('email').value.trim();
      const pass  = document.getElementById('password').value;
      const btn   = document.getElementById('submit-btn');
      const errEl = document.getElementById('error-msg');
      errEl.classList.remove('show');

      if (!email) { showError('Email address is required.'); return; }
      if (!pass)  { showError('Password is required.'); return; }

      btn.innerHTML = '<svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.2" stroke-linecap="round" stroke-dasharray="20 40" style="animation:spin .8s linear infinite"><path d="M12 2a10 10 0 110 20"/></svg> AUTHENTICATING…';
      btn.disabled = true; btn.style.opacity = '.7';

      // Simulate — replace with real auth
      setTimeout(() => {
        window.location.href = 'scanner.html';
      }, 1600);
    }

    document.addEventListener('keydown', e => {
      if (e.key === 'Enter') handleSignIn();
    });
  </script>
</body>
</html>
