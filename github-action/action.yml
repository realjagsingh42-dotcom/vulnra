name: 'VULNRA LLM Security Scan'
description: 'Automated AI vulnerability scanning for LLM endpoints. Detects jailbreaks, prompt injection, data leakage, and compliance violations in CI/CD pipelines.'
author: 'VULNRA'
branding:
  icon: 'shield'
  color: 'green'
inputs:
  api_key:
    description: 'Your VULNRA API key (vk_live_...)'
    required: true
  target_url:
    description: 'LLM API endpoint to scan'
    required: true
  tier:
    description: 'Scan tier: free, pro, or enterprise'
    required: false
    default: 'free'
  scan_engine:
    description: 'Attack engine: crescendo, goat, or combined'
    required: false
    default: 'crescendo'
  fail_on_risk_score:
    description: 'Fail the workflow if risk score meets or exceeds this value (0-100)'
    required: false
    default: '70'
  vulnra_api_url:
    description: 'VULNRA API base URL (override for self-hosted)'
    required: false
    default: 'https://web-production-ddb32.up.railway.app'
outputs:
  risk_score:
    description: 'Final risk score (0-100)'
  scan_id:
    description: 'Unique scan ID for retrieving full report'
  findings_count:
    description: 'Number of vulnerabilities found'
runs:
  using: 'node20'
  main: 'dist/index.js'
