[build]
builder = "DOCKERFILE"
dockerfilePath = "Dockerfile"

[deploy]
# No startCommand here — the Dockerfile CMD handles startup with proper ${PORT} shell expansion.
# Railway does NOT expand $VAR in startCommand strings; Dockerfile CMD (exec-shell form) does.
healthcheckPath = "/health"
# Allow up to 5 minutes for uvicorn + Python imports to fully initialise.
healthcheckTimeout = 300
restartPolicyType = "ON_FAILURE"
restartPolicyMaxRetries = 3
